name: Tests

# Runs the unit suite on every pull request so a broken PR is caught before
# merge — deploy.yml only tests on push to main, i.e. after the fact.

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
