<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Pinch-zoom stays enabled (WCAG 1.4.4): touch-action on the page already
         keeps play gestures from scrolling/zooming mid-game, and low-vision
         players need to be able to magnify the overlays. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d12" />
    <link rel="icon" href="./icons/favicon-64.png" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dungeons" />
    <title>Dungeons</title>
    <style>
      :root {
        color-scheme: dark;

        /* Canonical DOM-UI palette. Every DOM overlay color comes from these
           custom properties (the HUD's HP colors use var() in inline styles
           too). The Phaser canvas has its own palette in
           src/renderer/tileStyle.js — the layers deliberately don't share a
           module (architecture guards). The ONE color both must agree on by
           hand is the void background: --c-bg / body background here ==
           BG_COLOR in tileStyle.js (#05060a), so letterbox and page blend. */
        --c-bg: #05060a; /* void bg, input bg, text on light buttons */
        --c-panel: #0b0d12; /* raised panel surface */
        --c-border: #3a4256; /* panel & input borders, idle focus */
        --c-rule: #232838; /* hairline separators */
        --c-text: #cdd3e0; /* primary text, light-button surface */
        --c-text-hi: #ffffff; /* emphasis */
        --c-text-dim: #8a93a6; /* labels, muted, dim cells */
        --c-good: #7ad07a; /* hp-high, focus ring */
        --c-warn: #e8c15a; /* hp-mid */
        --c-bad: #ff6b6b; /* hp-low, "You died" */
        --c-scrim: rgba(5, 6, 10, 0.82); /* overlay backdrops */

        /* Spacing scale — the literals already in use (4/6/8/12/16). */
        --sp-1: 4px;
        --sp-2: 6px;
        --sp-3: 8px;
        --sp-4: 12px;
        --sp-5: 16px;

        /* Font-size scale — existing literals. */
        --fs-xs: 12px;
        --fs-sm: 13px;
        --fs-md: 14px;
        --fs-lg: 15px;
        --fs-xl: 17px;

        --font-mono: 'DejaVu Sans Mono', 'Courier New', monospace;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05060a;
        /* Taps map cleanly to tiles; no pull-to-refresh or double-tap zoom. */
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #game {
        position: fixed;
        inset: 0;
        display: block;
      }
      /* The Phaser canvas is centered by the renderer; leftover space is
         neutral letterbox provided by the body background. */
      #game canvas {
        display: block;
        image-rendering: pixelated;
      }

      /* HUD / log / game-over are DOM overlays anchored to screen edges so they
         stay crisp at native resolution and adapt to any aspect ratio. */
      .overlay {
        position: fixed;
        z-index: 10;
        font-family: var(--font-mono);
        color: var(--c-text);
        pointer-events: none;
      }
      #hud {
        top: max(8px, env(safe-area-inset-top));
        left: max(10px, env(safe-area-inset-left));
        /* Reserve room on the right for the Menu button so banked buffs
           (STR/SKL/ARM) wrap to a new line instead of sliding under it. */
        max-width: calc(
          100vw - max(10px, env(safe-area-inset-left)) - max(10px, env(safe-area-inset-right)) -
            52px
        );
        display: flex;
        flex-wrap: wrap;
        gap: 4px 16px; /* tight row-gap when wrapped; column gap unchanged */
        font-size: var(--fs-lg);
        text-shadow:
          0 1px 2px #000,
          0 0 2px #000;
      }
      /* Keep each readout intact when the row wraps. */
      #hud .hud-item {
        white-space: nowrap;
      }
      #hud b {
        color: var(--c-text-hi);
        font-weight: 700;
      }
      #hud .hud-dim {
        opacity: 0.5;
      }
      /* Build version: dim watermark on the row under the Menu text, so
         screenshots identify the build without crowding the gameplay stats. */
      #hudversion {
        top: calc(max(8px, env(safe-area-inset-top)) + 22px);
        right: max(10px, env(safe-area-inset-right));
        font-size: 15px;
        opacity: 0.5;
        text-shadow:
          0 1px 2px #000,
          0 0 2px #000;
      }
      #msglog {
        left: max(10px, env(safe-area-inset-left));
        right: max(10px, env(safe-area-inset-right));
        bottom: max(8px, env(safe-area-inset-bottom));
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        max-height: 40%;
        overflow: hidden;
        font-size: 13px;
        line-height: 1.35;
        text-shadow:
          0 1px 2px #000,
          0 0 2px #000;
      }
      /* Menu trigger: plain HUD text ("Menu"), top-right, matching the HP/Floor
         readouts. Appended straight to <body>, so it positions itself. Its
         z-index sits above the death overlay (10) but below the open menu panel
         (20), so it stays tappable on the "You died" screen. */
      #menubtn {
        position: fixed;
        z-index: 15;
        top: max(8px, env(safe-area-inset-top));
        right: max(10px, env(safe-area-inset-right));
        margin: 0;
        padding: 0;
        font-family: var(--font-mono);
        font-size: var(--fs-lg);
        color: var(--c-text);
        background: none;
        border: 0;
        cursor: pointer;
        text-shadow:
          0 1px 2px #000,
          0 0 2px #000;
      }
      #menubtn:hover {
        color: #fff;
      }
      #menubtn:active {
        transform: translateY(1px);
      }
      /* Keep it looking like plain text: no default focus box. Keyboard focus is
         still indicated, just by brightening the text (same as hover). */
      #menubtn:focus {
        outline: none;
      }
      #menubtn:focus-visible {
        color: #fff;
      }

      /* Pause/options menu: a plain terminal-style panel over a dimmed backdrop.
         The backdrop captures pointer events so map taps behind it don't fall
         through. Kept deliberately flat and monospace — NetHack-ish. */
      #menu {
        inset: 0;
        z-index: 20;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(5, 6, 10, 0.82);
        pointer-events: auto;
      }
      #menu.show {
        display: flex;
      }
      .menu-panel {
        box-sizing: border-box;
        width: min(320px, 90vw);
        max-height: 90vh;
        overflow-y: auto;
        background: #0b0d12;
        border: 1px solid #3a4256;
        padding: 12px 14px 14px;
        outline: none;
      }
      .menu-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
        padding-bottom: 8px;
        border-bottom: 1px solid #232838;
      }
      .menu-head h2 {
        margin: 0;
        font-size: 15px;
        letter-spacing: 1px;
        font-weight: 700;
        color: #fff;
      }
      .menu-x {
        width: 22px;
        height: 22px;
        padding: 0;
        font-family: inherit;
        font-size: 17px;
        line-height: 1;
        color: #8a93a6;
        background: transparent;
        border: 0;
        cursor: pointer;
      }
      .menu-x:hover {
        color: #fff;
      }
      /* Options read as a plain text list; hover inverts the row like a
         highlighted NetHack menu selection. */
      .menu-actions {
        display: flex;
        flex-direction: column;
      }
      .menu-actions button {
        display: flex;
        align-items: baseline;
        gap: 8px;
        width: 100%;
        padding: 5px 8px;
        font-family: inherit;
        font-size: 14px;
        text-align: left;
        color: #cdd3e0;
        background: transparent;
        border: 0;
        cursor: pointer;
      }
      .menu-actions button:hover {
        background: #cdd3e0;
        color: #05060a;
      }
      .menu-seed {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid #232838;
      }
      .menu-seed-label {
        margin-bottom: 6px;
        font-size: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #8a93a6;
      }
      .menu-seed-row {
        display: flex;
        gap: 6px;
        align-items: stretch;
        margin: 0 0 6px;
      }
      .menu-seed-val {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        padding: 5px 8px;
        font-family: inherit;
        font-size: 13px;
        color: #cdd3e0;
        background: #05060a;
        border: 1px solid #232838;
      }
      .menu-seed-input {
        flex: 1;
        min-width: 0;
        box-sizing: border-box;
        padding: 5px 8px;
        font-family: inherit;
        font-size: 13px;
        color: #fff;
        background: #05060a;
        border: 1px solid #3a4256;
      }
      .menu-seed-input:focus {
        outline: none;
        border-color: #7ad07a;
      }
      .menu-seed button {
        padding: 5px 12px;
        font-family: inherit;
        font-size: 13px;
        color: #05060a;
        background: #cdd3e0;
        border: 0;
        cursor: pointer;
        white-space: nowrap;
      }
      .menu-seed button:hover {
        background: #fff;
      }
      /* Footer line with the app version — same separator language as the
         seed section, dimmer since it's reference info, not a control. */
      .menu-version {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid #232838;
        font-size: 12px;
        letter-spacing: 1px;
        color: #8a93a6;
      }

      /* Leaderboard and help: menu-style panels layered above the menu
         (z-index 30) so they can be opened from it; the menu stays open
         underneath and Escape closes only the topmost layer. */
      #leaderboard,
      #help {
        inset: 0;
        z-index: 30;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(5, 6, 10, 0.82);
        pointer-events: auto;
      }
      #leaderboard.show,
      #help.show {
        display: flex;
      }
      .lb-panel,
      .help-panel {
        width: min(380px, 92vw);
      }
      /* Section header inside a panel — same visual language as the menu's
         seed label, shared by the leaderboard and help overlays. */
      .panel-label {
        margin: 0 0 6px;
        font-size: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #8a93a6;
      }
      .help-panel .panel-label {
        margin-top: 12px;
      }
      .help-panel .panel-label:first-of-type {
        margin-top: 0;
      }
      .lb-status {
        padding: 18px 0;
        text-align: center;
        font-size: 13px;
        color: #8a93a6;
      }
      .lb-table,
      .help-table {
        width: 100%;
        border-collapse: collapse;
        /* Deterministic columns: widths come from the first row / explicit
           rules, not the browser's content-driven default, so the help and
           leaderboard columns line up instead of drifting with their data. */
        table-layout: fixed;
        font-size: var(--fs-sm);
      }
      /* Leaderboard column widths (# / Who / Floor / Ver / When). With fixed
         layout these are taken from the header row and shared by every body
         row, giving stable, even spacing. */
      .lb-table th:nth-child(1),
      .lb-table td:nth-child(1) {
        width: 12%;
      }
      .lb-table th:nth-child(2),
      .lb-table td:nth-child(2) {
        width: 16%;
      }
      .lb-table th:nth-child(3),
      .lb-table td:nth-child(3) {
        width: 18%;
      }
      .lb-table th:nth-child(4),
      .lb-table td:nth-child(4) {
        width: 22%;
      }
      .lb-table th:nth-child(5),
      .lb-table td:nth-child(5) {
        width: 32%;
      }
      .lb-table th {
        padding: 2px 6px;
        text-align: left;
        font-weight: 400;
        color: #8a93a6;
        border-bottom: 1px solid #232838;
      }
      .lb-table td {
        padding: 3px 6px;
        color: var(--c-text);
        /* Clip an unexpectedly long value (e.g. a hostile version string) to
           its column instead of blowing out the whole table. */
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .lb-table .lb-num {
        text-align: right;
      }
      .lb-table .lb-initials {
        color: #fff;
        font-weight: 700;
        letter-spacing: 1px;
      }
      .lb-table .lb-dim {
        color: #8a93a6;
      }
      .help-table td {
        padding: 3px 6px;
        vertical-align: top;
        color: #8a93a6;
      }
      /* One shared key-column width across all three help tables (Symbols /
         Stats / Controls) so every description column lines up on the same
         left edge. 116px fits the widest key ("Arrows / WASD") without
         overflow. */
      .help-table .help-key {
        width: 116px;
        color: var(--c-text);
        white-space: nowrap;
      }
      .help-table .help-glyph {
        color: var(--c-text-hi);
        font-weight: 700;
      }

      #gameover {
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(5, 6, 10, 0.8);
        pointer-events: auto;
      }
      #gameover.show {
        display: flex;
      }
      /* A centered flex column with one uniform gap replaces the old grab-bag
         of child margins, so the death screen reads with an even rhythm
         instead of bunched up. gap also collapses cleanly when the initials
         form is hidden (submission unconfigured). */
      .go-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--sp-5);
        text-align: center;
      }
      .go-panel h1 {
        color: var(--c-bad);
        font-size: clamp(24px, 6vw, 34px);
        letter-spacing: 2px;
        margin: 0;
      }
      .go-panel p {
        margin: 0;
        font-size: var(--fs-md);
      }
      .go-panel button {
        margin-top: 0;
        padding: 8px 18px;
        font-family: inherit;
        font-size: var(--fs-lg);
        color: var(--c-bg);
        background: var(--c-text);
        border: 0;
        cursor: pointer;
        pointer-events: auto;
      }
      .go-panel button:hover {
        background: var(--c-text-hi);
      }
      .go-panel button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      /* Arcade initials entry: a stubby 3-character field + submit, dropped a
         row under the floor line. */
      .go-initials {
        display: flex;
        gap: 6px;
        align-items: stretch;
        justify-content: center;
        margin-top: 0;
      }
      .go-initials input {
        width: 5ch;
        padding: 5px 8px;
        text-align: center;
        font-family: inherit;
        font-size: var(--fs-lg);
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--c-text-hi);
        background: var(--c-bg);
        border: 1px solid var(--c-border);
      }
      .go-initials input:focus {
        outline: none;
        border-color: var(--c-good);
      }
      .go-initials input:disabled {
        opacity: 0.5;
      }
      .go-panel .go-initials button {
        margin-top: 0;
        padding: 5px 12px;
        font-size: var(--fs-sm);
      }
      .go-status {
        /* Reserve a line so the layout doesn't jump when the status text
           (Sending…/Submitted!) appears; vertical spacing is owned by the
           panel's gap, so no margin here. */
        min-height: 1.2em;
        margin: 0;
        font-size: var(--fs-sm);
        color: var(--c-text-dim);
      }
      .go-buttons {
        display: flex;
        gap: 8px;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
