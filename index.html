<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b0d12" />
    <link rel="icon" href="./icons/favicon-64.png" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dungeons" />
    <title>Dungeons</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05060a;
        /* Taps map cleanly to tiles; no pull-to-refresh or double-tap zoom. */
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #game {
        position: fixed;
        inset: 0;
        display: block;
      }
      /* The Phaser canvas is centered by the renderer; leftover space is
         neutral letterbox provided by the body background. */
      #game canvas {
        display: block;
        image-rendering: pixelated;
      }

      /* HUD / log / game-over are DOM overlays anchored to screen edges so they
         stay crisp at native resolution and adapt to any aspect ratio. */
      .overlay {
        position: fixed;
        z-index: 10;
        font-family: 'DejaVu Sans Mono', 'Courier New', monospace;
        color: #cdd3e0;
        pointer-events: none;
      }
      #hud {
        top: max(8px, env(safe-area-inset-top));
        left: max(10px, env(safe-area-inset-left));
        display: flex;
        gap: 16px;
        font-size: 15px;
        text-shadow: 0 1px 2px #000, 0 0 2px #000;
      }
      #hud b {
        color: #fff;
        font-weight: 700;
      }
      #hud .hud-dim {
        opacity: 0.5;
      }
      /* Build version: dim watermark on the row under the Menu text, so
         screenshots identify the build without crowding the gameplay stats. */
      #hudversion {
        top: calc(max(8px, env(safe-area-inset-top)) + 22px);
        right: max(10px, env(safe-area-inset-right));
        font-size: 15px;
        opacity: 0.5;
        text-shadow: 0 1px 2px #000, 0 0 2px #000;
      }
      #msglog {
        left: max(10px, env(safe-area-inset-left));
        right: max(10px, env(safe-area-inset-right));
        bottom: max(8px, env(safe-area-inset-bottom));
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        max-height: 40%;
        overflow: hidden;
        font-size: 13px;
        line-height: 1.35;
        text-shadow: 0 1px 2px #000, 0 0 2px #000;
      }
      /* Menu trigger: plain HUD text ("Menu"), top-right, matching the HP/Floor
         readouts. Appended straight to <body>, so it positions itself. Its
         z-index sits above the death overlay (10) but below the open menu panel
         (20), so it stays tappable on the "You died" screen. */
      #menubtn {
        position: fixed;
        z-index: 15;
        top: max(8px, env(safe-area-inset-top));
        right: max(10px, env(safe-area-inset-right));
        margin: 0;
        padding: 0;
        font-family: 'DejaVu Sans Mono', 'Courier New', monospace;
        font-size: 15px;
        color: #cdd3e0;
        background: none;
        border: 0;
        cursor: pointer;
        text-shadow: 0 1px 2px #000, 0 0 2px #000;
      }
      #menubtn:hover {
        color: #fff;
      }
      #menubtn:active {
        transform: translateY(1px);
      }
      /* Keep it looking like plain text: no default focus box. Keyboard focus is
         still indicated, just by brightening the text (same as hover). */
      #menubtn:focus {
        outline: none;
      }
      #menubtn:focus-visible {
        color: #fff;
      }

      /* Pause/options menu: a plain terminal-style panel over a dimmed backdrop.
         The backdrop captures pointer events so map taps behind it don't fall
         through. Kept deliberately flat and monospace — NetHack-ish. */
      #menu {
        inset: 0;
        z-index: 20;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(5, 6, 10, 0.82);
        pointer-events: auto;
      }
      #menu.show {
        display: flex;
      }
      .menu-panel {
        box-sizing: border-box;
        width: min(320px, 90vw);
        max-height: 90vh;
        overflow-y: auto;
        background: #0b0d12;
        border: 1px solid #3a4256;
        padding: 12px 14px 14px;
        outline: none;
      }
      .menu-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
        padding-bottom: 8px;
        border-bottom: 1px solid #232838;
      }
      .menu-head h2 {
        margin: 0;
        font-size: 15px;
        letter-spacing: 1px;
        font-weight: 700;
        color: #fff;
      }
      .menu-x {
        width: 22px;
        height: 22px;
        padding: 0;
        font-family: inherit;
        font-size: 17px;
        line-height: 1;
        color: #8a93a6;
        background: transparent;
        border: 0;
        cursor: pointer;
      }
      .menu-x:hover {
        color: #fff;
      }
      /* Options read as a plain text list; hover inverts the row like a
         highlighted NetHack menu selection. */
      .menu-actions {
        display: flex;
        flex-direction: column;
      }
      .menu-actions button {
        display: flex;
        align-items: baseline;
        gap: 8px;
        width: 100%;
        padding: 5px 8px;
        font-family: inherit;
        font-size: 14px;
        text-align: left;
        color: #cdd3e0;
        background: transparent;
        border: 0;
        cursor: pointer;
      }
      .menu-actions button:hover {
        background: #cdd3e0;
        color: #05060a;
      }
      .menu-seed {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid #232838;
      }
      .menu-seed-label {
        margin-bottom: 6px;
        font-size: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #8a93a6;
      }
      .menu-seed-row {
        display: flex;
        gap: 6px;
        align-items: stretch;
        margin: 0 0 6px;
      }
      .menu-seed-val {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        padding: 5px 8px;
        font-family: inherit;
        font-size: 13px;
        color: #cdd3e0;
        background: #05060a;
        border: 1px solid #232838;
      }
      .menu-seed-input {
        flex: 1;
        min-width: 0;
        box-sizing: border-box;
        padding: 5px 8px;
        font-family: inherit;
        font-size: 13px;
        color: #fff;
        background: #05060a;
        border: 1px solid #3a4256;
      }
      .menu-seed-input:focus {
        outline: none;
        border-color: #7ad07a;
      }
      .menu-seed button {
        padding: 5px 12px;
        font-family: inherit;
        font-size: 13px;
        color: #05060a;
        background: #cdd3e0;
        border: 0;
        cursor: pointer;
        white-space: nowrap;
      }
      .menu-seed button:hover {
        background: #fff;
      }
      /* Footer line with the app version — same separator language as the
         seed section, dimmer since it's reference info, not a control. */
      .menu-version {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px solid #232838;
        font-size: 12px;
        letter-spacing: 1px;
        color: #8a93a6;
      }

      /* Leaderboard and help: menu-style panels layered above the menu
         (z-index 30) so they can be opened from it; the menu stays open
         underneath and Escape closes only the topmost layer. */
      #leaderboard,
      #help {
        inset: 0;
        z-index: 30;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(5, 6, 10, 0.82);
        pointer-events: auto;
      }
      #leaderboard.show,
      #help.show {
        display: flex;
      }
      .lb-panel,
      .help-panel {
        width: min(380px, 92vw);
      }
      /* Section header inside a panel — same visual language as the menu's
         seed label, shared by the leaderboard and help overlays. */
      .panel-label {
        margin: 0 0 6px;
        font-size: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #8a93a6;
      }
      .help-panel .panel-label {
        margin-top: 12px;
      }
      .help-panel .panel-label:first-of-type {
        margin-top: 0;
      }
      .lb-status {
        padding: 18px 0;
        text-align: center;
        font-size: 13px;
        color: #8a93a6;
      }
      .lb-table,
      .help-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      .lb-table th {
        padding: 2px 6px;
        text-align: left;
        font-weight: 400;
        color: #8a93a6;
        border-bottom: 1px solid #232838;
      }
      .lb-table td {
        padding: 3px 6px;
        color: #cdd3e0;
      }
      .lb-table .lb-num {
        text-align: right;
      }
      .lb-table .lb-initials {
        color: #fff;
        font-weight: 700;
        letter-spacing: 1px;
      }
      .lb-table .lb-dim {
        color: #8a93a6;
      }
      .help-table td {
        padding: 3px 6px;
        vertical-align: top;
        color: #8a93a6;
      }
      .help-table .help-key {
        width: 110px;
        color: #cdd3e0;
        white-space: nowrap;
      }
      .help-table .help-glyph {
        width: 28px;
        color: #fff;
        font-weight: 700;
      }

      #gameover {
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(5, 6, 10, 0.8);
        pointer-events: auto;
      }
      #gameover.show {
        display: flex;
      }
      .go-panel {
        text-align: center;
      }
      .go-panel h1 {
        color: #ff6b6b;
        font-size: clamp(24px, 6vw, 34px);
        letter-spacing: 2px;
        margin: 0 0 6px;
      }
      .go-panel p {
        margin: 4px 0 0;
        font-size: 14px;
      }
      .go-panel button {
        margin-top: 16px;
        padding: 8px 18px;
        font-family: inherit;
        font-size: 15px;
        color: #05060a;
        background: #cdd3e0;
        border: 0;
        cursor: pointer;
        pointer-events: auto;
      }
      .go-panel button:hover {
        background: #fff;
      }
      .go-panel button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      /* Arcade initials entry: a stubby 3-character field + submit, dropped a
         row under the floor line. */
      .go-initials {
        display: flex;
        gap: 6px;
        align-items: stretch;
        justify-content: center;
        margin-top: 14px;
      }
      .go-initials input {
        width: 5ch;
        padding: 5px 8px;
        text-align: center;
        font-family: inherit;
        font-size: 15px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: #fff;
        background: #05060a;
        border: 1px solid #3a4256;
      }
      .go-initials input:focus {
        outline: none;
        border-color: #7ad07a;
      }
      .go-initials input:disabled {
        opacity: 0.5;
      }
      .go-panel .go-initials button {
        margin-top: 0;
        padding: 5px 12px;
        font-size: 13px;
      }
      .go-status {
        min-height: 1.2em;
        margin: 8px 0 0;
        font-size: 13px;
        color: #8a93a6;
      }
      .go-buttons {
        display: flex;
        gap: 8px;
        justify-content: center;
      }
      .go-panel .go-buttons button {
        margin-top: 14px;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
